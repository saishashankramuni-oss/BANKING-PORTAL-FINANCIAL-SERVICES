<!DOCTYPE html>
<html>
<head>
  <title>MyBank Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0B3C5D, #328CC1);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 40px;
      width: 350px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .login-box h2 {
      color: #0B3C5D;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #328CC1;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #0B3C5D;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #328CC1;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #0B3C5D;
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: gray;
    }

  </style>
</head>

<body>

  <div class="login-box">
    <h2>MyBank Login</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div class="link">
      Don't have an account? <a href="register.html">Register</a>
    </div>

    <div class="footer">
      © 2026 MyBank. All rights reserved.
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if(username === "" || password === "") {
        alert("Please fill all fields");
        return;
      }

      const res = await fetch("http://localhost:3000/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if(data.username) {
        localStorage.setItem("user", data.username);
        window.location = "dashboard.html";
      } else {
        alert("Invalid Login");
      }
    }
  </script>

</body>
</html>
