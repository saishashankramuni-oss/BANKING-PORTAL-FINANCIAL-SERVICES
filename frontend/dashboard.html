<!DOCTYPE html>
<html>
<head>
<title>MyBank Dashboard</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

/* NAVBAR */
.navbar {
  background: linear-gradient(90deg,#0B3C5D,#328CC1);
  color:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout {
  background:white;
  color:#0B3C5D;
  border:none;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
}

/* CONTAINER */
.container {
  padding:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

/* PROFILE */
.profile {
  text-align:center;
}

.avatar {
  width:70px;
  height:70px;
  background:#328CC1;
  color:white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  margin:10px auto;
}

/* BALANCE */
.balance {
  font-size:30px;
  color:#328CC1;
  font-weight:bold;
}

/* BUTTON */
button {
  padding:10px;
  border:none;
  background:linear-gradient(90deg,#0B3C5D,#328CC1);
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

/* PAYEES */
.payee {
  padding:8px;
  background:#eef3f7;
  margin:5px 0;
  border-radius:6px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

th {
  background:#f4f7fa;
}

/* ATM CARD */
.atm-card {
  width:100%;
  max-width:320px;
  height:180px;
  border-radius:15px;
  padding:20px;
  color:white;
  background: linear-gradient(135deg,#0B3C5D,#328CC1);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  position:relative;
}

.chip {
  width:50px;
  height:35px;
  background:gold;
  border-radius:5px;
  margin-bottom:15px;
}

.card-number {
  font-size:18px;
  letter-spacing:2px;
  margin-bottom:15px;
}

.card-bottom {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.bank-name {
  position:absolute;
  top:15px;
  right:20px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="navbar">
  <h2 id="welcome">Welcome</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="grid">

    <!-- PROFILE -->
    <div class="card profile">
      <h3>Profile</h3>
      <div class="avatar" id="avatar">U</div>
      <p><b id="name"></b></p>
      <p id="email"></p>
      <p id="phone"></p>
    </div>

    <!-- ACCOUNT -->
    <div class="card">
      <h3>Account Details</h3>
      <p><b>Account No:</b> <span id="accNo"></span></p>
      <p><b>Account Type:</b> <span id="accType"></span></p>
      <p class="balance" id="balance">₹0</p>
    </div>

    <!-- ATM CARD -->
    <div class="card">
      <h3>ATM Card</h3>

      <div class="atm-card">
        <div class="bank-name">MyBank</div>

        <div class="chip"></div>

        <div class="card-number" id="cardNumber">
          0000 0000 0000 0000
        </div>

        <div class="card-bottom">
          <div>
            <small>Card Holder</small><br>
            <span id="cardName">USER</span>
          </div>

          <div>
            <small>Expiry</small><br>
            12/30
          </div>
        </div>
      </div>
    </div>

    <!-- QUICK ACTION -->
    <div class="card">
      <h3>Quick Actions</h3>
      <button onclick="goTransfer()">💸 Transfer Money</button>
    </div>

    <!-- PAYEES -->
    <div class="card">
      <h3>Saved Payees</h3>
      <div id="payees"></div>
    </div>

  </div>

  <!-- TRANSACTIONS -->
  <div class="card" style="margin-top:20px;">
    <h3>Transaction History</h3>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Account</th>
          <th>Name</th>
          <th>Amount</th>
          <th>Balance</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

</div>

<script>
const user = localStorage.getItem("user");

if(!user){
  window.location="index.html";
}

/* LOAD USER */
async function loadUser(){
  const res = await fetch(`http://localhost:3000/api/user/${user}`);
  const data = await res.json();

  document.getElementById("welcome").innerText = "Welcome " + data.name;
  document.getElementById("name").innerText = data.name;
  document.getElementById("email").innerText = data.email;
  document.getElementById("phone").innerText = data.phone;

  document.getElementById("accNo").innerText = data.accountNumber;
  document.getElementById("accType").innerText = data.accountType;
  document.getElementById("balance").innerText = "₹" + data.balance;

  document.getElementById("avatar").innerText = data.name.charAt(0).toUpperCase();

  /* ATM CARD */
  document.getElementById("cardName").innerText = data.name.toUpperCase();

  let acc = data.accountNumber.replace("AC","");
  let card = acc.padEnd(16,"0").substring(0,16);
  let formatted = card.match(/.{1,4}/g).join(" ");
  document.getElementById("cardNumber").innerText = formatted;

  /* PAYEES */
  const payeeDiv = document.getElementById("payees");
  payeeDiv.innerHTML = "";

  if(data.payees.length === 0){
    payeeDiv.innerHTML = "No payees added";
  } else {
    data.payees.forEach(p=>{
      const div = document.createElement("div");
      div.className="payee";
      div.innerText = p;
      payeeDiv.appendChild(div);
    });
  }
}

/* TRANSACTIONS */
async function loadTransactions(){
  const res = await fetch(`http://localhost:3000/api/transactions/${user}`);
  const data = await res.json();

  const table = document.getElementById("history");
  table.innerHTML = "";

  data.forEach(t=>{
    let color = t.type==="CREDIT" ? "green" : "red";

    table.innerHTML += `
      <tr>
        <td style="color:${color};font-weight:bold">${t.type}</td>
        <td>${t.toAccount}</td>
        <td>${t.toName}</td>
        <td style="color:${color}">₹${t.amount}</td>
        <td>₹${t.balance}</td>
        <td>${new Date(t.date).toLocaleDateString()}</td>
      </tr>
    `;
  });
}

function goTransfer(){
  window.location="transfer.html";
}

function logout(){
  localStorage.clear();
  window.location="index.html";
}

loadUser();
loadTransactions();
</script>

</body>
</html>
